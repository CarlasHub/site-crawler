# Deploy: fly launch (once) then fly deploy
# Set secrets for production (e.g. JOB_STATE_BACKEND=firestore) per README.
app = "carla-site-crawler"
primary_region = "ams"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
